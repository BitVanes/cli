name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: bitvanes-${{ github.ref_name }}-x86_64-linux.tar.gz
            bin: bitvanes
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: bitvanes-${{ github.ref_name }}-aarch64-macos.tar.gz
            bin: bitvanes
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: bitvanes-${{ github.ref_name }}-x86_64-macos.tar.gz
            bin: bitvanes
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: bitvanes-${{ github.ref_name }}-x86_64-windows.zip
            bin: bitvanes.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }} ${{ matrix.bin }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }} ${{ matrix.bin }}

      - name: Generate SHA256
        # macOS lacks sha256sum (uses `shasum -a 256`); Linux/Windows Git
        # Bash ship sha256sum. Fall back so all matrix OSes produce a checksum.
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARTIFACT" > "$ARTIFACT.sha256"
          else
            shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"
          fi
        env:
          ARTIFACT: ${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          generate_release_notes: true
